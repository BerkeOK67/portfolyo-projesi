<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projelerim - Berke OK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">Berke OK</a>
            <nav>
                <a href="index.html">Anasayfa</a>
                <a href="projeler.html" class="active">Projeler</a>
                <a href="hakkimda.html">Hakkımda</a>
                <a href="iletisim.html">İletişim</a>
            </nav>
            <div class="social-links" id="social-links">
                <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <h1>Projelerim</h1>
        <p>Geliştirdiğim tüm projeler. Detaylar için proje kartına tıklayın.</p>
    </div>

    <!-- All Projects -->
    <section class="section">
        <div id="all-projects" class="projects-grid">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>Projeler yükleniyor...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Berke OK. Tüm hakları saklıdır.</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('all-projects');
            
            // Projeleri yükle
            getProjects((projects) => {
                if (projects.length === 0) {
                    grid.innerHTML = '<div class="loading"><p>Henüz proje eklenmemiş.</p></div>';
                    return;
                }
                grid.innerHTML = projects.map(project => createProjectCard(project)).join('');
            });
            
            // Sosyal medya linklerini yükle
            database.ref('iletisim').once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const socialLinks = document.getElementById('social-links');
                    let html = '';
                    if (data.github) html += `<a href="${data.github}" target="_blank"><i class="fab fa-github"></i></a>`;
                    if (data.linkedin) html += `<a href="${data.linkedin}" target="_blank"><i class="fab fa-linkedin"></i></a>`;
                    if (data.twitter) html += `<a href="${data.twitter}" target="_blank"><i class="fab fa-twitter"></i></a>`;
                    if (data.instagram) html += `<a href="${data.instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`;
                    if (html) socialLinks.innerHTML = html;
                }
            });
        });
    </script>
</body>
</html>
