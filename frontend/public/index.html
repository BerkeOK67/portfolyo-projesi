<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berke OK - Portfolyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e7;
        }

        /* Header */
        header {
            background: rgba(15, 15, 35, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav a {
            color: #a1a1aa;
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #667eea;
        }

        .social-links a {
            color: #a1a1aa;
            font-size: 1.2rem;
            margin-left: 1rem;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #667eea;
        }

        /* Hero Section */
        .hero {
            padding: 8rem 2rem 4rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.25rem;
            color: #a1a1aa;
            line-height: 1.8;
        }

        .hero-tags {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .hero-tags span {
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            color: #667eea;
        }

        /* Projects Section */
        .projects-section {
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 3rem;
            color: #e4e4e7;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        /* Project Card */
        .project-card {
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .project-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .project-content {
            padding: 1.5rem;
        }

        .project-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #e4e4e7;
        }

        .project-content p {
            color: #a1a1aa;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .project-technologies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .project-technologies span {
            background: rgba(102, 126, 234, 0.1);
            color: #818cf8;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .project-links {
            display: flex;
            gap: 1rem;
        }

        .project-links a {
            color: #a1a1aa;
            text-decoration: none;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .project-links a:hover {
            color: #667eea;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: #a1a1aa;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #71717a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            nav a {
                margin: 0 0.75rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">Berke OK</div>
            <nav>
                <a href="#projects">Projeler</a>
                <a href="#about">Hakkimda</a>
                <a href="#contact">Iletisim</a>
            </nav>
            <div class="social-links">
                <a href="https://github.com/BerkeOK67" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>Merhaba, Ben Berke</h1>
        <p>Full-stack gelistirici olarak modern web teknolojileri ve bulut servisleri ile projeler gelistiriyorum.</p>
        <div class="hero-tags">
            <span>Python</span>
            <span>Flask</span>
            <span>React</span>
            <span>AWS</span>
            <span>PostgreSQL</span>
        </div>
    </section>

    <!-- Projects -->
    <section class="projects-section" id="projects">
        <h2 class="section-title">Projelerim</h2>
        <div id="projects-grid" class="projects-grid">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>Projeler yukleniyor...</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Berke OK. Tum haklari saklidir.</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA-Rt67cjlkXP20Quwx48-lu6WULBvr9wU",
            authDomain: "portfolyo-projesi-9f34a.firebaseapp.com",
            databaseURL: "https://portfolyo-projesi-9f34a-default-rtdb.firebaseio.com",
            projectId: "portfolyo-projesi-9f34a",
            storageBucket: "portfolyo-projesi-9f34a.firebasestorage.app",
            messagingSenderId: "861060100504",
            appId: "1:861060100504:web:1a1c4a47f8f096cf437bed"
        };

        // Firebase'i baslat
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function renderProjects(projects) {
            const grid = document.getElementById('projects-grid');
            
            if (!projects || projects.length === 0) {
                grid.innerHTML = `
                    <div class="loading">
                        <p>Henuz proje eklenmemis.</p>
                        <p style="margin-top: 1rem; font-size: 0.875rem;">Firebase'e proje ekleyin.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = projects.map(project => `
                <div class="project-card">
                    <img src="${project.kapakFotografi || 'https://via.placeholder.com/400x250/667eea/ffffff?text=Proje'}" 
                         alt="${project.isim}" 
                         class="project-image"
                         onerror="this.src='https://via.placeholder.com/400x250/667eea/ffffff?text=Gorsel+Yok'">
                    <div class="project-content">
                        <h3>${project.isim}</h3>
                        <p>${project.aciklama || ''}</p>
                        ${project.teknolojiler ? `
                            <div class="project-technologies">
                                ${project.teknolojiler.map(tech => `<span>${tech}</span>`).join('')}
                            </div>
                        ` : ''}
                        <div class="project-links">
                            ${project.githubLink ? `
                                <a href="${project.githubLink}" target="_blank">
                                    <i class="fab fa-github"></i> GitHub
                                </a>
                            ` : ''}
                            ${project.canliLink ? `
                                <a href="${project.canliLink}" target="_blank">
                                    <i class="fas fa-external-link-alt"></i> Canli Demo
                                </a>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function loadProjects() {
            const grid = document.getElementById('projects-grid');
            
            // Firebase'den projeleri dinle (realtime)
            database.ref('projeler').on('value', (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    // Object veya array olabilir, array'e cevir
                    const projects = Array.isArray(data) ? data.filter(p => p) : Object.values(data);
                    renderProjects(projects);
                } else {
                    renderProjects([]);
                }
            }, (error) => {
                grid.innerHTML = `
                    <div class="loading">
                        <p style="color: #ef4444;">Firebase'e baglanilamadi.</p>
                        <p style="margin-top: 1rem; font-size: 0.875rem;">${error.message}</p>
                    </div>
                `;
            });
        }

        // Sayfa yuklendiginde projeleri getir
        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
